name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore dependencies
      run: dotnet restore

    - name: Lint (Analyzers)
      run: dotnet build --no-restore -warnaserror
      
    - name: Build
      run: dotnet build --no-restore
      
    - name: Test
      run: dotnet test --no-build --verbosity normal

  sonar:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-latest
    needs: test

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Godot .NET
      run: brew install --cask godot-mono

    - name: Resolve Godot Binary
      run: |
        for path in \
          "/Applications/Godot_mono.app/Contents/MacOS/Godot" \
          "/Applications/Godot.app/Contents/MacOS/Godot"; do
          if [ -x "$path" ]; then
            echo "GODOT_BIN=$path" >> "$GITHUB_ENV"
            echo "Using Godot binary: $path"
            exit 0
          fi
        done
        echo "Could not find Godot binary after installing godot-mono." >&2
        exit 1

    - name: Install SonarScanner for .NET
      run: dotnet tool update --global dotnet-sonarscanner

    - name: Install dotnet-coverage
      run: dotnet tool update --global dotnet-coverage

    - name: Generate Coverage (NUnit phase)
      run: |
        ./run_tests.sh nunit --show-failures-only --coverage --coverage-output TestResults/coverage/coverage.xml
        if [ ! -s "TestResults/coverage/coverage.xml" ]; then
          echo "Coverage file missing or empty: TestResults/coverage/coverage.xml" >&2
          exit 1
        fi

    - name: Inspect Coverage Report Mapping
      run: |
        echo "Coverage file size (bytes): $(wc -c < TestResults/coverage/coverage.xml)"
        grep -oE 'path="[^"]+"' TestResults/coverage/coverage.xml | sed -E 's/^path="(.*)"$/\1/' > TestResults/coverage/paths.txt || true
        echo "Path entries: $(wc -l < TestResults/coverage/paths.txt)"
        echo "Script path entries: $(grep -cE '(^|/)Scripts/.*\.cs$' TestResults/coverage/paths.txt || true)"
        echo "Test path entries: $(grep -cE '(^|/)Tests/.*\.cs$' TestResults/coverage/paths.txt || true)"
        echo "First 30 paths:"
        sed -n '1,30p' TestResults/coverage/paths.txt || true

    - name: Upload Coverage Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sonar-coverage-xml
        path: |
          TestResults/coverage/coverage.xml
          TestResults/coverage/paths.txt

    - name: Sonar Analyze
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        SONAR_EXTRA_ARGS=""
        while IFS='=' read -r key value; do
          if [ -z "$key" ]; then
            continue
          fi
          case "$key" in
            \#*)
              continue
              ;;
          esac
          SONAR_EXTRA_ARGS="$SONAR_EXTRA_ARGS /d:${key}=${value}"
        done < .sonar/sonar-dotnet.properties

        dotnet sonarscanner begin /k:"Archistrateia_Archistrateia" /o:"archistrateia" /d:sonar.token="${SONAR_TOKEN}" ${SONAR_EXTRA_ARGS}
        dotnet build
        dotnet sonarscanner end /d:sonar.token="${SONAR_TOKEN}"
