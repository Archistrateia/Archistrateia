# SonarScanner for .NET analysis parameters maintained in-repo.
# CI loads this file and forwards each key/value as /d:<key>=<value>.

# Keep coverage import path in source control.
sonar.cs.opencover.reportsPaths=TestResults/coverage/coverage.opencover.xml

# Exclude non-product/generated folders.
sonar.exclusions=Tests/**,.godot/**

# Reduce noise from rules that are often not a good fit for Godot game scripts.
sonar.issue.ignore.multicriteria=e1,e2,e3
sonar.issue.ignore.multicriteria.e1.ruleKey=csharpsquid:S3903
sonar.issue.ignore.multicriteria.e1.resourceKey=**/Scripts/**/*.cs
sonar.issue.ignore.multicriteria.e2.ruleKey=csharpsquid:S2325
sonar.issue.ignore.multicriteria.e2.resourceKey=**/Scripts/**/*.cs
sonar.issue.ignore.multicriteria.e3.ruleKey=csharpsquid:S3267
sonar.issue.ignore.multicriteria.e3.resourceKey=**/Scripts/**/*.cs
